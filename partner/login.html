<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Partner přihlášení – FVEpakety</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css">
  <style>
    .login-page { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; background: var(--bg-light); }
    .login-card { background: white; padding: 40px; border-radius: var(--radius-lg); box-shadow: var(--shadow-lg); max-width: 400px; width: 100%; }
    .login-card h1 { font-size: 24px; margin-bottom: 8px; }
    .login-card p { color: var(--text-light); margin-bottom: 24px; }
    .login-card .form-group { margin-bottom: 16px; }
    .login-card label { display: block; font-weight: 500; margin-bottom: 6px; }
    .login-card input { width: 100%; padding: 12px 16px; border: 1px solid var(--border); border-radius: var(--radius-sm); font-size: 16px; }
    .login-card .btn { width: 100%; margin-top: 8px; }
    .login-error { background: #fef2f2; color: #b91c1c; padding: 12px; border-radius: var(--radius-sm); margin-bottom: 16px; display: none; }
    .login-error.show { display: block; }
    .back-link { display: inline-block; margin-top: 24px; color: var(--text-light); text-decoration: none; font-size: 14px; }
    .back-link:hover { color: var(--orange); }
  </style>
</head>
<body>
  <div class="login-page">
    <div class="login-card">
      <a href="../index.html" class="logo" style="display: inline-flex; margin-bottom: 24px;">
        <span class="logo-icon">⚡</span>
        <span>FVE<span class="logo-accent">pakety</span></span>
      </a>
      <h1>Partner přihlášení</h1>
      <p>Přihlaste se pro zobrazení vašich leadů podle regionu.</p>
      <div class="login-error" id="loginError"></div>
      <form id="loginForm">
        <div class="form-group">
          <label for="email">E-mail</label>
          <input type="email" id="email" placeholder="partner@example.de" required>
        </div>
        <div class="form-group">
          <label for="password">Heslo</label>
          <input type="password" id="password" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn btn-primary">Přihlásit se</button>
      </form>
      <a href="../index.html" class="back-link">← Zpět na hlavní stránku</a>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../supabase-config.js"></script>
  <script src="partner-auth.js"></script>
  <script src="partner-login.js"></script>
</body>
</html>
